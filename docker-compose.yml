services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: rohan
      POSTGRES_PASSWORD: dev_password
      POSTGRES_DB: devtrack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rohan -d devtrack"]
      interval: 5s
      retries: 5

  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://rohan:dev_password@devtrack:5432/app
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./main.py:/app/main.py
      - ./database.py:/app/database.py
      - ./auth.py:/app/auth.py
      - ./schemas.py:/app/schemas.py
      - ./alembic:/app/alembic
      - ./alembic.ini:/app/alembic.ini
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data: